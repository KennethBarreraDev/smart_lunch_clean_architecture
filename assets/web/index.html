	<style>
		/* Estilo del loader proporcionado */
		.loader {
			width: 50px;
			aspect-ratio: 1;
			border-radius: 50%;
			background:
				radial-gradient(farthest-side, #ffa516 94%, #0000) top/8px 8px no-repeat,
				conic-gradient(#0000 30%, #ffa516);
			-webkit-mask: radial-gradient(farthest-side, #0000 calc(100% - 8px), #000 0);
			animation: l13 1s infinite linear;
		}

		@keyframes l13 {
			100% {
				transform: rotate(1turn);
			}
		}

		/* Centrar el loader */
		.loader-container {
			display: none;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			/* Altura completa de la ventana */
			width: 100vw;
			/* Anchura completa de la ventana */
		}

			display: none;
			/* Oculto por defecto */
		}
	</style>
